<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="1200" height="320" role="img">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1929">
        <animate attributeName="stop-color" values="#0a1929;#0d2847;#0a1929" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#102a43">
        <animate attributeName="stop-color" values="#102a43;#1565c0;#102a43" dur="8s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="320" fill="url(#bg)"/>

  <!-- floating particles -->
  <g fill="#4FC3F7">
    <circle cx="120" cy="80" r="4" opacity="0.6">
      <animate attributeName="cy" values="80;60;80" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0.2;0.6" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="980" cy="120" r="5" opacity="0.5">
      <animate attributeName="cy" values="120;95;120" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0.15;0.5" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="300" cy="250" r="3" opacity="0.5">
      <animate attributeName="cy" values="250;230;250" dur="4.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1080" cy="240" r="4" opacity="0.4">
      <animate attributeName="cy" values="240;215;240" dur="7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="650" cy="60" r="3" opacity="0.4">
      <animate attributeName="opacity" values="0.4;0.1;0.4" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="220" cy="180" r="3" opacity="0.35">
      <animate attributeName="cy" values="180;160;180" dur="5.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="900" cy="270" r="3" opacity="0.4">
      <animate attributeName="opacity" values="0.4;0.1;0.4" dur="4s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- name with pulsing glow -->
  <text x="600" y="160" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif"
        font-size="58" font-weight="700" fill="#ffffff" filter="url(#glow)">
    Henrico Hosaki
    <animate attributeName="opacity" values="0;1" dur="1.5s" fill="freeze"/>
  </text>

  <text x="600" y="205" text-anchor="middle" font-family="Fira Code, monospace"
        font-size="22" fill="#4FC3F7" letter-spacing="2">
    Full Stack Developer &#183; AI Enthusiast
    <animate attributeName="opacity" values="0;0;1" dur="2.5s" fill="freeze"/>
  </text>

  <!-- animated underline -->
  <line x1="450" y1="230" x2="750" y2="230" stroke="#4FC3F7" stroke-width="2">
    <animate attributeName="x1" values="600;450;600" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="600;750;600" dur="4s" repeatCount="indefinite"/>
  </line>
</svg>
